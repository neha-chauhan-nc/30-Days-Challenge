<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUZZLE GAME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>DRAG AND DROP PUZZLE GAME</h1>
    <div class="bg"></div>

    <div id="drag" class="drag">

      <div class="dragbox">
        <div id="block1" class="images" draggable="true" ondragstart="drag(event)" style="--img:url(00.png)"></div>
     </div>

     <div class="dragbox">
       <div id="block2" class="images" draggable="true" ondragstart="drag(event)" style="--img:url(01.png)"></div>
       </div> 
         
         <div class="dragbox">
        <div id="block3" class="images" draggable="true" ondragstart="drag(event)" style="--img:url(02.png)"></div>
        </div>
        <div class="dragbox">
        <div id="block4" class="images" draggable="true" ondragstart="drag(event)" style="--img:url(10.png)"></div>
        </div>
        <div class="dragbox">
        <div id="block5" class="images" draggable="true" ondragstart="drag(event)" style="--img:url(11.png)"></div>
        </div>
        <div class="dragbox">
        <div id="block6" class="images" draggable="true" ondragstart="drag(event)" style="--img:url(12.png)"></div>
        </div>
        <div class="dragbox">
        <div id="block7" class="images" draggable="true" ondragstart="drag(event)" style="--img:url(20.png)"></div>
        </div>
        <div class="dragbox">
        <div id="block8" class="images" draggable="true" ondragstart="drag(event)" style="--img:url(21.png)"></div>
        </div>
        <div class="dragbox">
        <div id="block9" class="images" draggable="true" ondragstart="drag(event)" style="--img:url(22.png)"></div>
         </div>   
       
    </div>

    <div class="drop">
        <div class="dropbox" ondrop="drop(event)" ondragover="dropOver(event)"></div>
        <div class="dropbox" ondrop="drop(event)" ondragover="dropOver(event)"></div>
        <div class="dropbox" ondrop="drop(event)" ondragover="dropOver(event)"></div>
        <div class="dropbox" ondrop="drop(event)" ondragover="dropOver(event)"></div>
        <div class="dropbox" ondrop="drop(event)" ondragover="dropOver(event)"></div>
        <div class="dropbox" ondrop="drop(event)" ondragover="dropOver(event)"></div>
        <div class="dropbox" ondrop="drop(event)" ondragover="dropOver(event)"></div>
        <div class="dropbox" ondrop="drop(event)" ondragover="dropOver(event)"></div>
        <div class="dropbox" ondrop="drop(event)" ondragover="dropOver(event)"></div>

    </div>

    <button id="reset" onclick="window.location.reload()">RESET PUZZLE</button><!--reload the img.-->

<script src="script.js"></script> 
</body>
</html>
